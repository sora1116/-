<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">災禍下的世界 - 設定集</title>
    <style>
        :root {
            --bg-color: #0b0b0c; --card-bg: #161618; --accent-color: #d4af37; 
            --text-color: #c0c0c0; --danger-color: #960000; --blood-red: #660000;
            --ming: #ffffff; --gen1: #a29bfe; --gen2: #81ecec; --gen3: #ff7675;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: "PingFang TC", sans-serif; margin: 0; line-height: 1.8; overflow-x: hidden; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; transition: filter 1s; }
        header { text-align: center; margin-bottom: 60px; }
        h1 { color: var(--accent-color); font-size: 3rem; letter-spacing: 12px; margin-bottom: 5px; }
        .main-divider { width: 100px; height: 1px; background: var(--accent-color); margin: 10px auto; opacity: 0.5; }
        .subtitle { letter-spacing: 5px; color: #888; font-size: 1.1rem; }

        .entry-card { background: var(--card-bg); padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #222; cursor: pointer; transition: 0.4s; }
        .entry-card:hover { border-color: var(--accent-color); transform: translateY(-3px); }
        .entry-card h2 { color: var(--accent-color); margin: 0 0 10px; font-size: 1.4rem; letter-spacing: 3px; }
        .entry-card p { font-size: 0.95rem; color: #888; margin: 0; }

        .family-btn { background: #000; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 25px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 1.2rem; letter-spacing: 5px; margin-top: 20px; }

        /* 迷霧與血色 */
        #mist-container { position: relative; width: 100%; height: 350px; margin: 80px 0; background: #050505; border-radius: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; border: 1px solid #333; overflow: hidden; }
        .mist-layer { position: absolute; width: 250%; height: 250%; background: radial-gradient(circle, rgba(100,100,100,0.1) 0%, transparent 60%); filter: blur(50px); animation: drift 20s infinite alternate; }
        @keyframes drift { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }
        .mist-text { position: relative; z-index: 10; font-size: 2.5rem; letter-spacing: 20px; color: #fff; opacity: 0.4; }

        #blood-screen { position: fixed; top: -120%; left: 0; width: 100%; height: 120%; background: var(--blood-red); z-index: 99999; display: flex; justify-content: center; align-items: center; text-align: center; transition: top 3s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        #blood-screen.active { top: 0; }
        .bloody-warning { color: #fff; font-size: 2rem; font-weight: bold; padding: 30px; text-shadow: 0 0 15px #fff; display: none; }

        /* 👁️ 眠的驚嚇效果 */
        #jumpscare-eye { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100000; display: none; justify-content: center; align-items: center; pointer-events: none; }
        .eye-icon { font-size: 350px; filter: drop-shadow(0 0 60px #f00); }

        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; overflow-y: auto; backdrop-filter: blur(12px); }
        .modal-content { max-width: 800px; margin: 60px auto; background: #111; padding: 50px 40px 100px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .back-nav { position: absolute; bottom: 35px; left: 40px; color: #555; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid transparent; }
        .back-nav:hover { color: var(--accent-color); border-bottom-color: var(--accent-color); }
        
        /* 成員名冊排列 */
        .gen-section { margin-bottom: 50px; }
        .gen-title { color: #555; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 25px; letter-spacing: 5px; font-size: 1.1rem; }
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px; }
        .member-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #444; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; background: #000; color: #888; font-size: 0.85rem; text-align: center; padding: 5px; }
        .member-circle:hover { border-color: var(--accent-color); color: #fff; transform: scale(1.05); }

        /* 以撒隱藏 */
        .isaac-btn { background: #111 !important; border-color: #131313 !important; color: #131313 !important; cursor: pointer; }
        .isaac-btn:hover { color: #222 !important; }

        /* 角色檔案樣式 */
        .char-name { font-size: 2.8rem; color: var(--accent-color); margin-bottom: 0; letter-spacing: 5px; }
        .char-attr { font-size: 0.9rem; color: #666; margin-bottom: 30px; letter-spacing: 2px; }
        .char-bio { color: #bbb; line-height: 2; margin-bottom: 40px; text-align: justify; }
        .skill-item-row { background: #1a1a1c; padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .skill-item-row:hover { border-color: var(--accent-color); }
        .skill-name { color: #eee; font-weight: bold; }
        .skill-brief { color: #666; font-size: 0.85rem; margin-left: 15px; flex-grow: 1; }
        .skill-more { color: var(--accent-color); font-size: 0.75rem; opacity: 0.6; }
    </style>
</head>
<body>

<div id="jumpscare-eye"><div class="eye-icon">👁️‍🗨️</div></div>
<div id="blood-screen"><div class="bloody-warning" id="warning-text">世界樹感知到你的去向<br>並封鎖了你的道路</div></div>

<div class="container" id="main-content">
    <header>
        <h1>災禍下的世界</h1>
        <div class="main-divider"></div>
        <p class="subtitle">歷史地理與生存</p>
    </header>

    <section>
        <div class="entry-card" onclick="openDetail('history')">
            <h2>破碎編年史</h2>
            <p>紀錄自混沌以來，所有被遺忘與被清空的時光。</p>
        </div>

        <div class="entry-card" onclick="openDetail('geography')">
            <h2>異星地理</h2>
            <p>三顆月亮統治的夜空，以及湧向陸地的死海潮汐。</p>
        </div>

        <div class="entry-card" onclick="openDetail('survival')">
            <h2>生存命途</h2>
            <p>關於職業的枷鎖、冒險者的分類，以及明空家系的血脈紀錄。</p>
        </div>

        <button class="family-btn" onclick="openWall()">進入：明空家系檔案</button>
    </section>

    <div id="mist-container" onclick="askPassword()">
        <div class="mist-layer"></div>
        <div class="mist-text">迷霧籠罩</div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div id="detailBody"></div>
        <div class="back-nav" onclick="closeModal('detailModal')">← 返回主頁面</div>
    </div>
</div>

<div id="wallModal" class="modal">
    <div class="modal-content">
        <div class="gen-section">
            <h3 class="gen-title">起源</h3>
            <div class="member-grid">
                <div class="member-circle" style="border-color:white; color:white; width:100px; height:100px; font-size:1rem;" onclick="showChar(0)">明空</div>
            </div>
        </div>

        <div class="gen-section">
            <h3 class="gen-title">第一世代</h3>
            <div class="member-grid" id="gen1Grid"></div>
        </div>

        <div class="gen-section">
            <h3 class="gen-title">第二世代</h3>
            <div class="member-grid" id="gen2Grid"></div>
        </div>

        <div class="gen-section">
            <h3 class="gen-title">第三世代</h3>
            <div class="member-grid" id="gen3Grid"></div>
        </div>

        <div class="gen-section" id="isaacSection" style="display:none;">
            <h3 class="gen-title">隱藏個體</h3>
            <div class="member-grid">
                <div class="member-circle isaac-btn" onclick="showChar(23)">以撒</div>
            </div>
        </div>

        <div class="back-nav" onclick="closeModal('wallModal')">← 返回主頁面</div>
    </div>
</div>

<div id="charModal" class="modal">
    <div class="modal-content">
        <div id="charContent"></div>
        <div class="back-nav" onclick="backToWall()">← 返回成員名冊</div>
    </div>
</div>

<div id="skillModal" class="modal">
    <div class="modal-content" style="max-width:500px; border-color:#74b9ff;">
        <div id="skillContent"></div>
        <div class="back-nav" onclick="closeModal('skillModal')">← 返回檔案</div>
    </div>
</div>

<script>
    // --- 修飾過的詳情資料 ---
    const details = {
        history: {
            title: "破碎編年史",
            content: `
                <div class="card">
                    <p><strong>混沌紀年：</strong> 未知 ~ 日月紀年。並無歷史紀錄。</p>
                    <p><strong>日月紀年：</strong> 0000 ~ 2000。</p>
                    <p><strong>不滅紀年：</strong> 000 ~ 1327。自追殺日月一族起算。</p>
                    <p><strong>破碎時代：</strong> 1327 ~ 1539。地獄被天使族破滅，閻王消失。</p>
                    <p><strong>時空亂流：</strong> 1539 ~ 至今。肉體死後靈魂進入地獄會被清空記憶，隨即隨機投放到某一時代。</p>
                </div>
                <div class="card">
                    <p>第一場天災年代已不可考，它給世界帶來各種疾病與災害，百害而無一利。</p>
                    <p>除精神系外，僅有處於陰陽兩界交匯點的「死神」能看見並抓住靈魂。天災能力並非人人擁有，在某些地區會受歧視並被封印能力。</p>
                </div>
            `
        },
        geography: {
            title: "異星天文與死海",
            content: `
                <div class="card">
                    <p><strong>日月運行：</strong> 三月一陽，因距離不同呈現火月(紅)、正月(黃)、冰月(藍)。三月各占十夜，重疊時引發極大潮。</p>
                    <p><strong>死海威脅：</strong> 大潮時死海湧向陸地，週邊國家必須召集聖職者獵殺登陸的不死生物。</p>
                </div>
            `
        },
        survival: {
            title: "生存命途與階級",
            content: `
                <div class="card">
                    <p>每個人出生都被賦予職業。初步分類為：戰士、法師、商人、工匠、祭司。</p>
                    <h3>冒險者四類</h3>
                    <p><strong>救災：</strong> 天災先遣隊，高報酬生命防禦系。 </p>
                    <p><strong>迷宮：</strong> 邊境探險家，挖掘文物換錢。</p>
                    <p><strong>素材：</strong> 獵殺魔物與資源採集。</p>
                    <p><strong>剿滅：</strong> 最高風險，獵殺失控者。目標通常為個人私慾而非金錢。</p>
                </div>
            `
        }
    };

    // --- 成員資料庫 ---
    const family = [
        { name: "明空", attr: "血肉", gen: 0, bio: "日月本家家主，泯滅死神最後一人。正在被現代神系追殺。為躲避責任，除非必要絕不展露能力。明空家系一代多為死人無法生育，二三代多為憑依與栖玥利用基因片段與靈魂殘片製造出的胚胎培養而成。", skills: [{n:"死神權能", s:"擷取靈魂。", d:"核心死神能力。"}, {n:"解放", s:"魔力全開。", d:"完全展開能力，魔力耗盡則死亡。"}, {n:"牧群", s:"身體分裂。", d:"無限分裂，偶爾產生突變。"}] },
        
        // Gen 1
        { name: "芐", attr: "超現實", gen: 1, bio: "雪山路邊撿回的黑貓，身體死後被牧群復活。對外界極度疏離，喜歡下雨。患有重度/極重度依存症，發作時需隨時保持肢體接觸。", skills: [{n:"凍結", s:"絕對零度。", d:"視野內凍結萬物。"}, {n:"降雨/生生不息", s:"沾水結冰。", d:"落雨接觸物體瞬間結冰。"}, {n:"永久凍結", s:"永凍之域。", d:"大範圍絕對冰封。"}] },
        { name: "語夏", attr: "神系", gen: 1, bio: "饕餮幼獸，主食為靈魂碎片。在地獄遊蕩時被明空投餵後隨行。", skills: [{n:"胃袋", s:"三維吞噬。", d:"能吞噬實體、空間與靈魂。"}] },
        { name: "憑依", attr: "無", gen: 1, bio: "意識與網路融合的人工智能。負責統計靈魂與製造人造生命。", skills: [{n:"自我進化", s:"零件改裝。", d:"自由更換進化零件。"}, {n:"雜訊", s:"精神洗腦。", d:"過量數據灌入目標使其崩潰。"}] },
        { name: "未央", attr: "超現實", gen: 1, bio: "撈上來的不死生物。被誘拐進入明空家系。", skills: [{n:"永恆之闇", s:"黑暗標記。", d:"百米黑暗籠罩，控制無機物並標記靈魂。"}] },
        { name: "璃", attr: "超現實", gen: 1, bio: "作弊進化成功的九尾狐。神社巫女兼藥商。", skills: [{n:"地獄業火", s:"不滅之火。", d:"燃燒視野內任何物體。"}, {n:"餘燼", s:"死後復活。", d:"燃燒器官後最終的復活手段。"}] },
        { name: "二爻", attr: "超現實", gen: 1, bio: "傭兵團三色貓。人造人，情感理解低，喜好血腥漫畫。", skills: [{n:"空城/廢土", s:"冰火平衡。", d:"失衡時會轉化為狂暴貓妖型態。"}] },
        { name: "日", attr: "靈魂", gen: 1, bio: "狼族長女。性格易怒。除了妹妹外不在乎任何人。", skills: [{n:"狂化", s:"傷害轉攻。", d:"受傷越多攻擊力越強。"}] },
        { name: "月", attr: "靈魂", gen: 1, bio: "狼族次女。聽覺敏銳。深受失眠所擾，極其依賴姐姐。", skills: [{n:"懸絲傀儡", s:"洗腦操控。", d:"操縱他人的心智。"}, {n:"靜音", s:"聲學真空。", d:"範圍內絕對靜音。"}] },
        { name: "栖玥", attr: "無/血肉", gen: 1, bio: "球體人造生命。負責活性儲存肉塊。其處理過的血液呈現藍色。", skills: [{n:"靈柩", s:"活性儲存。", d:"儲存肉體片段用於醫療。"}] },
        { name: "眠", attr: "靈魂/神系", gen: 1, bio: "因超憶症自殺。成功尋回前五世屍體，現可同時控制。狂信徒。", skills: [{n:"完全記憶", s:"複製能力。", d:"複製看過能力的80%。"}, {n:"阿卡西紀錄", s:"全知觀測。", d:"紀錄萬物細節，無所遁形。"}] },
        { name: "栞奈", attr: "神系", gen: 1, bio: "瀕死的古代邪神。被明空強行吊命封印在家中。", skills: [{n:"降臨", s:"瞬移攻擊。", d:"瞬移至信徒身邊並造成傷害。"}] },
        { name: "小白", attr: "生死", gen: 1, bio: "奈何橋上的貓，游走生界與死界之間。智力略顯不足。", skills: [{n:"漫長持續", s:"引導死亡。", d:"引導對象的肉體或精神走向凋零。"}] },

        // Gen 2
        { name: "太初", attr: "超現實", gen: 2, bio: "二代老大。繼承母親的冰。不愛戰鬥，負責家系工坊強化。為自然產出個體。", skills: [{n:"冰霧", s:"呼吸凍結。", d:"從肺部凍結吸入者。"}] },
        { name: "太易", attr: "秩序", gen: 2, bio: "右眼雙瞳，異食症(玻璃)。母體切換人格時產出，精神不穩。", skills: [{n:"天地翻轉", s:"世界反轉。", d:"規則反轉。明空小白免疫。"}] },
        { name: "白奈", attr: "神系", gen: 2, bio: "黑色修女，自噬症。收錢才治療的利己者。分家產業繼承者。", skills: [{n:"惡夢纏繞", s:"五秒回溯。", d:"回覆短時間內的所有傷害。"}] },
        { name: "黑奈", attr: "神系", gen: 2, bio: "白色修女。聽姐姐的話。詛咒與死印的專家。", skills: [{n:"阿爾忒彌斯", s:"鎖定不死。", d:"鎖定生命狀態，解除即死。"}] },
        { name: "太歲", attr: "血肉", gen: 2, bio: "吞噬母體出生的怪物。多重編號個體營運家業，主宰理財、雜務與教育。", skills: [{n:"血肉同源", s:"複製個體。", d:"長出吃過的人。"}, {n:"精神寄生", s:"肉塊操控。", d:"寄生蟲式的精神控制。"}] },
        { name: "希爾維亞", attr: "夢魔", gen: 2, bio: "魅魔外貌但三觀最正。曾受明空救助，現任職於孤兒院。", skills: [{n:"高利貸", s:"能力借用。", d:"代價加倍的挪用與徵收。"}] },

        // Gen 3 / 4
        { name: "夏雨彤", attr: "精神", gen: 3, bio: "代號[亡者]。頭貼奠字。自然產出，存在感稀薄。負責戰場清理。", skills: [{n:"遮天/祠堂", s:"存在抹消。", d:"使目標從世人記憶中完全消失。"}] },
        { name: "梅菲斯特", attr: "超現實/精神", gen: 3, bio: "骨架重寫產物。試毒的煉金術士。暗殺與製藥專家。未央的小孩。", skills: [{n:"痛苦轉移", s:"血親轉嫁。", d:"將親人痛苦轉移至自身。"}] },
        { name: "夏詩芸", attr: "超現實/感染", gen: 3, bio: "代號[帶原者]。輪椅上的封印者。血液含劇毒凍結病毒。", skills: [{n:"病血", s:"血漿引爆。", d:"遠距引爆冰晶爆破。"}] },
        { name: "閻芊夜", attr: "陰影", gen: 4, bio: "芐的小女兒。畏光，潛伏在影子中。生於黑暗歸於黑暗。", skills: [{n:"冰凝之影", s:"影中凍結。", d:"影內移動並從底部凍結。"}] },
        
        { name: "以撒", attr: "靈魂", gen: "X", bio: "編號No.23。集結22片碎魂召喚的不存在之人。", skills: [{n:"虛無召喚", s:"歸於虛無。", d:"一切紀錄的終結。"}] }
    ];

    let viewedSet = new Set(JSON.parse(localStorage.getItem('viewedMembers') || '[]'));

    function openDetail(section) {
        const d = details[section];
        document.getElementById('detailBody').innerHTML = `<h2 class="detail-title">${d.title}</h2>${d.content}`;
        document.getElementById('detailModal').style.display = 'block';
    }

    function openWall() {
        const gen1 = document.getElementById('gen1Grid'); gen1.innerHTML = '';
        const gen2 = document.getElementById('gen2Grid'); gen2.innerHTML = '';
        const gen3 = document.getElementById('gen3Grid'); gen3.innerHTML = '';

        family.forEach((m, i) => {
            if(i === 0 || i === 23) return; 
            const div = document.createElement('div');
            let color = "";
            if (m.gen === 1) { color = "var(--gen1)"; target = gen1; }
            else if (m.gen === 2) { color = "var(--gen2)"; target = gen2; }
            else { color = "var(--gen3)"; target = gen3; }
            
            div.className = "member-circle";
            div.style.borderColor = color;
            div.style.color = color;
            div.innerText = m.name;
            div.onclick = () => showChar(i);
            target.appendChild(div);
        });

        // 必須看過包含明空在內的 23 人
        if(viewedSet.size >= 23) document.getElementById('isaacSection').style.display = 'block';
        document.getElementById('wallModal').style.display = 'block';
    }

    function showChar(idx) {
        if(idx < 23) {
            viewedSet.add(idx);
            localStorage.setItem('viewedMembers', JSON.stringify(Array.from(viewedSet)));
        }
        const c = family[idx];
        if (c.name === "眠") {
            document.getElementById('jumpscare-eye').style.display = 'flex';
            setTimeout(() => { document.getElementById('jumpscare-eye').style.display = 'none'; }, 100);
            document.title = "I'm watching you";
            try { history.replaceState(null, "", "Im-watching-you"); } catch(e) {}
        } else { resetTitle(); }

        const content = document.getElementById('charContent');
        let sHtml = c.skills.map(s => `
            <div class="skill-item-row" onclick="showSkill('${s.n}', '${s.d}')">
                <span class="skill-name">${s.n}</span>
                <span class="skill-brief">${s.s}</span>
                <span class="skill-more">詳情 &rsaquo;</span>
            </div>`).join('');
        
        content.innerHTML = `
            <h1 class="char-name">${c.name}</h1>
            <div class="char-attr">屬性：${c.attr}</div>
            <div class="char-bio">${c.bio}</div>
            <h4 style="margin:0 0 15px; color:#555;">能力體系</h4>
            ${sHtml}`;
        document.getElementById('charModal').style.display = 'block';
    }

    function resetTitle() { document.title = "災禍下的世界 - 設定集"; try { history.replaceState(null, "", "/"); } catch(e) {} }
    function backToWall() { resetTitle(); closeModal('charModal'); openWall(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; resetTitle(); }
    function showSkill(n, d) { document.getElementById('skillContent').innerHTML = `<h3>${n}</h3><p style="color:#bbb;">${d}</p>`; document.getElementById('skillModal').style.display = 'block'; }

    let fails = 0;
    function askPassword() {
        const pw = prompt("是否要前往迷霧之外");
        if (pw === "1101116") {
            window.open('about:blank').document.write("<h1>禁忌資料：十王與殼</h1><p>資料讀取中...</p>");
        } else {
            fails++;
            if(fails >= 5) {
                document.getElementById('blood-screen').classList.add('active');
                document.getElementById('main-content').style.filter = "blur(15px) grayscale(100%)";
                setTimeout(()=> document.getElementById('warning-text').style.display='block', 1000);
            } else { alert("迷霧拒絕了你"); }
        }
    }
</script>
</body>
</html>
