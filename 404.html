<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">災禍下的世界 - 設定集</title>
    <style>
        :root {
            --bg-color: #0b0b0c; --card-bg: #161618; --accent-color: #d4af37; 
            --text-color: #c0c0c0; --danger-color: #960000; --blood-red: #660000;
            --gen1: #a29bfe; --gen2: #81ecec; --gen3: #ff7675; --gen4: #fab1a0;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: "PingFang TC", sans-serif; margin: 0; line-height: 1.7; overflow-x: hidden; }
        
        /* 主容器與標題 */
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; transition: filter 1s; }
        header { text-align: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 20px; margin-bottom: 50px; }
        h1 { color: var(--accent-color); font-size: 2.5rem; letter-spacing: 6px; }
        h2 { color: var(--accent-color); border-left: 4px solid var(--accent-color); padding-left: 15px; margin: 40px 0 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 明空家入口按鈕 */
        .family-entry-btn { background: #111; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 20px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 1.2rem; letter-spacing: 2px; transition: 0.3s; }
        .family-entry-btn:hover { box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }

        /* 迷霧區塊 */
        #mist-container { position: relative; width: 100%; height: 300px; margin: 60px 0; background: #050505; border-radius: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; border: 1px solid #333; overflow: hidden; }
        .mist-layer { position: absolute; width: 250%; height: 250%; background: radial-gradient(circle, rgba(100,100,100,0.15) 0%, transparent 60%); filter: blur(50px); animation: drift 15s infinite alternate ease-in-out; }
        @keyframes drift { from { transform: translate(-20%, -20%); } to { transform: translate(10%, 10%); } }
        .mist-text { position: relative; z-index: 10; font-size: 2.8rem; letter-spacing: 20px; color: #fff; opacity: 0.6; font-weight: bold; }

        /* 🔴 血色封鎖層 (修正處) */
        #blood-screen { 
            position: fixed; top: -120%; left: 0; width: 100%; height: 120%; 
            background: var(--blood-red); z-index: 99999; display: flex; 
            justify-content: center; align-items: center; text-align: center;
            transition: top 3s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            box-shadow: 0 0 100px rgba(0,0,0,1) inset;
        }
        #blood-screen.active { top: 0; }
        .bloody-warning { 
            color: #fff; font-size: 2.2rem; font-weight: bold; padding: 20px; 
            text-shadow: 0 0 15px #fff, 0 10px 20px rgba(0,0,0,0.8);
            display: none; line-height: 1.5;
        }

        /* 👁️ 眠的眼睛閃現 */
        #jumpscare-eye { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100000; display: none; justify-content: center; align-items: center; pointer-events: none; }
        .eye-icon { font-size: 300px; filter: drop-shadow(0 0 50px #f00); animation: eyePulse 0.1s infinite; }
        @keyframes eyePulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }

        /* 彈窗體系 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; backdrop-filter: blur(8px); }
        .modal-content { max-width: 800px; margin: 40px auto; background: #1a1a1b; padding: 40px 30px 80px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .back-nav { position: absolute; bottom: 30px; left: 30px; color: #555; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid transparent; }
        .back-nav:hover { color: var(--accent-color); border-bottom: 1px solid var(--accent-color); }

        /* 成員名冊網格 */
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px; }
        .member-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #444; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; background: #111; color: #aaa; font-size: 0.9rem; }
        .member-circle:hover { border-color: var(--accent-color); color: #fff; transform: translateY(-5px); }

        /* 隱藏以撒 */
        .isaac-wrapper { display: none; }
        .isaac-btn { background: #1a1a1b !important; border-color: #1d1d1e !important; color: #1e1e1f !important; transition: color 2s !important; }
        .isaac-btn:hover { color: #333 !important; }

        /* 角色排版細節 */
        .char-title-quote { font-style: italic; color: var(--accent-color); font-size: 1.2rem; margin-bottom: 20px; display: block; opacity: 0.8; }
        .char-bio { background: #111; padding: 20px; border-radius: 8px; margin-bottom: 30px; border-left: 2px solid #333; }
        .skill-summary-card { background: #222; padding: 15px; border-radius: 5px; margin-bottom: 10px; border-left: 3px solid var(--accent-color); cursor: pointer; transition: 0.2s; }
        .skill-summary-card:hover { transform: translateX(5px); background: #2a2a2c; }
    </style>
</head>
<body>

<div id="jumpscare-eye"><div class="eye-icon">👁️‍🗨️</div></div>

<div id="blood-screen">
    <div class="bloody-warning" id="warning-text">
        世界樹感知到你的去向<br>並封鎖了你的道路
    </div>
</div>

<div class="container" id="main-content">
    <header>
        <h1>災禍下的世界</h1>
        <p>第一部分：生存法則與家系名冊</p>
    </header>

    <section>
        <h2>⏳ 歷史、地理與生存</h2>
        <div class="card">
            <p>歷史紀年：日月、不滅、破碎、時空。應對屬性：覺、妖、魔、肉。</p>
            <button class="family-entry-btn" onclick="openWall()">進入：明空家系成員檔案</button>
        </div>
    </section>

    <div id="mist-container" onclick="askPassword()">
        <div class="mist-layer"></div>
        <div class="mist-text">迷霧籠罩</div>
    </div>
</div>

<div id="wallModal" class="modal"><div class="modal-content"><h2 style="text-align:center; color:var(--accent-color); margin-bottom:30px;">明空家系檔案</h2><div class="member-grid" id="memberGrid"></div><div class="back-nav" onclick="closeModal('wallModal')">← 回到主頁面</div></div></div>
<div id="charModal" class="modal"><div class="modal-content"><div id="charContent"></div><div class="back-nav" onclick="backToWall()">← 回到成員名冊</div></div></div>
<div id="skillModal" class="modal"><div class="modal-content" style="max-width:500px; border-color:#74b9ff;"><div id="skillContent"></div><div class="back-nav" onclick="closeModal('skillModal')">← 返回角色生平</div></div></div>

<script>
    // 資料庫
    const family = [
        { name: "明空", title: "日月家主", gen: 1, info: "日月本家家主，正在被現代神系追殺。", skills: [{n:"死神權能", s:"擷取靈魂。", d:"核心死神權能。"}] },
        { name: "芐", title: "永久凍結的黑貓", gen: 1, info: "明空撿到的黑貓，重度依存症。", skills: [{n:"凍結", s:"絕對零度。", d:"視野內凍結。"}] },
        { name: "語夏", title: "饕餮幼獸", gen: 1, info: "食量驚人的靈魂捕食者。", skills: [{n:"胃袋", s:"無盡空間。", d:"吞噬一切。"}] },
        { name: "憑依", title: "AI網路意識", gen: 1, info: "熱衷於製造複製人的人工智能。", skills: [{n:"雜訊", s:"數據洗腦。", d:"大量數據衝擊精神。"}] },
        { name: "未央", title: "不死生物", gen: 1, info: "撈上來的不死生物。", skills: [{n:"永恆之闇", s:"黑暗遮蔽。", d:"控制黑暗與標記。"}] },
        { name: "璃", title: "九尾狐巫女", gen: 1, info: "神社巫女兼賣藥。", skills: [{n:"地獄業火", s:"不滅之火。", d:"燃燒萬物。"}] },
        { name: "二爻", title: "戰鬥法師", gen: 1, info: "理解感情困難的人造人。", skills: [{n:"空城", s:"精神失常。", d:"狂戰模式。"}] },
        { name: "日", title: "狼族長女", gen: 1, info: "除了妹妹誰都不在乎。", skills: [{n:"狂化", s:"痛感轉攻。", d:"反噬嚴重的強化。"}] },
        { name: "月", title: "狼族次女", gen: 1, info: "聽力極佳，喜歡姐姐。", skills: [{n:"懸絲傀儡", s:"洗腦操縱。", d:"控制心靈。"}] },
        { name: "栖玥", title: "血肉靈柩", gen: 1, info: "負責活性儲存肉塊。", skills: [{n:"靈柩", s:"活性儲存。", d:"臟器保存。"}] },
        { name: "眠", title: "全知全覺之眼", gen: 1, info: "超憶症狂信徒。成功找回過去五世屍體。", skills: [{n:"完全記憶", s:"複製能力80%。", d:"理解並重現他人能力。"}, {n:"阿卡西紀錄", s:"全知紀錄。", d:"紀錄萬物所有細節。"}] },
        { name: "栞奈", title: "古代邪神", gen: 1, info: "被明空吊命的神。", skills: [{n:"阿卡西紀錄-前", s:"能力書化。", d:"奪取能力並分發。"}] },
        { name: "小白", title: "生死之間", gen: 1, info: "介於生死界限的貓。", skills: [{n:"漫長持續", s:"引導死亡。", d:"引導對象邁向終結。"}] },
        { name: "太初", title: "工匠老大", gen: 2, info: "負責武器強化。", skills: [{n:"冰霧", s:"呼吸凍結。", d:"肺部凍結。"}] },
        { name: "太易", title: "逆王", gen: 2, info: "右眼雙瞳，精神不穩。", skills: [{n:"天地翻轉", s:"規則反轉。", d:"翻轉世界規則。"}] },
        { name: "白奈", title: "黑色修女", gen: 2, info: "收錢才治癒。", skills: [{n:"惡夢纏繞", s:"傷害回溯。", d:"回覆五秒傷害。"}] },
        { name: "黑奈", title: "白色修女", gen: 2, info: "同生共死咒印。", skills: [{n:"阿爾忒彌斯", s:"鎖定不死。", d:"解除即死。"}] },
        { name: "太歲", title: "血肉主宰", gen: 2, info: "多重編號個體營運家業。", skills: [{n:"血肉同源", s:"長出個體。", d:"複製吃過的個體。"}] },
        { name: "希爾維亞", title: "夢魔", gen: 2, info: "三觀最正的常識人。", skills: [{n:"高利貸", s:"能力借用。", d:"代價加倍的借用。"}] },
        { name: "夏雨彤", title: "亡者奠", gen: 3, info: "負責戰場清理與遺忘。", skills: [{n:"遮天/祠堂", s:"存在抹消。", d:"抹消物體存在。"}] },
        { name: "梅菲斯特", title: "煉金術士", gen: 3, info: "拿自己試毒，半臉燒傷。", skills: [{n:"痛苦轉移", s:"血親轉嫁。", d:"轉移傷害給自己。"}] },
        { name: "夏詩芸", title: "帶原者", gen: 3, info: "血液含強烈凍結病毒。", skills: [{n:"病血", s:"血漿引爆。", d:"遠距引爆冰晶。"}] },
        { name: "閻芊夜", title: "影子害獸", gen: 4, info: "畏光，影子移動。", skills: [{n:"冰凝之影", s:"影子凍結。", d:"足下凍結。"}] },
        { name: "以撒", title: "No.23", gen: "X", info: "碎片靈魂召喚，不存在之人。", skills: [{n:"虛無召喚", s:"歸於不存在。", d:"歸於無。"}] }
    ];

    // 記憶功能
    function getViewed() {
        const saved = localStorage.getItem('viewedMembers');
        return saved ? new Set(JSON.parse(saved)) : new Set();
    }
    let viewedSet = getViewed();

    function openWall() {
        const grid = document.getElementById('memberGrid'); grid.innerHTML = '';
        for(let i=0; i<23; i++) {
            const div = document.createElement('div');
            div.innerHTML = `<div class="member-circle" onclick="showChar(${i})">${family[i].name}</div><span style="font-size:0.7rem; color:#555; display:block; margin-top:5px; text-align:center;">Gen ${family[i].gen}</span>`;
            grid.appendChild(div);
        }
        if(viewedSet.size >= 23) {
            const isaac = document.createElement('div');
            isaac.className = "isaac-wrapper"; isaac.style.display = "block";
            isaac.innerHTML = `<div class="member-circle isaac-btn" onclick="showChar(23)">以撒</div><span style="font-size:0.7rem; color:#111; display:block; margin-top:5px; text-align:center;">Gen X</span>`;
            grid.appendChild(isaac);
        }
        document.getElementById('wallModal').style.display = 'block';
    }

    function showChar(idx) {
        if(idx < 23) {
            viewedSet.add(idx);
            localStorage.setItem('viewedMembers', JSON.stringify(Array.from(viewedSet)));
        }
        const c = family[idx];
        if (c.name === "眠") {
            document.getElementById('jumpscare-eye').style.display = 'flex';
            setTimeout(() => { document.getElementById('jumpscare-eye').style.display = 'none'; }, 100);
            document.title = "I'm watching you";
            try { history.replaceState(null, "", "Im-watching-you"); } catch(e) {}
        } else { resetTitle(); }

        const content = document.getElementById('charContent');
        let sHtml = c.skills.map(s => `<div class="skill-summary-card" onclick="showSkill('${s.n}', '${s.d}')"><div style="font-weight:bold;">${s.n}</div><div style="font-size:0.8rem; color:#888;">${s.s}</div></div>`).join('');
        content.innerHTML = `<h2 style="color:var(--accent-color); margin-bottom:5px;">${c.name}</h2><span class="char-title-quote">「${c.title}」</span><div class="char-bio">${c.info}</div><h4>能力與權能</h4><div class="skill-list-container">${sHtml}</div>`;
        document.getElementById('charModal').style.display = 'block';
    }

    function resetTitle() { document.title = "災禍下的世界 - 設定集"; try { history.replaceState(null, "", window.location.pathname.includes('github.io') ? window.location.pathname.split('/').slice(0,-1).join('/')+'/' : "/"); } catch(e) {} }
    function backToWall() { resetTitle(); closeModal('charModal'); openWall(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; resetTitle(); }
    function showSkill(n, d) { document.getElementById('skillContent').innerHTML = `<h3 style="color:var(--accent-color);">${n}</h3><p>${d}</p>`; document.getElementById('skillModal').style.display = 'block'; }

    // 🔴 密碼與血色封鎖邏輯
    let failedAttempts = 0;
    function askPassword() {
        if(document.getElementById('blood-screen').classList.contains('active')) return;
        const pw = prompt("是否要前往迷霧之外");
        if (pw === "1101116") {
            failedAttempts = 0;
            const nW = window.open('about:blank');
            nW.document.write("<h1>禁忌資料內容...</h1>");
            nW.document.close();
        } else {
            failedAttempts++;
            if(failedAttempts >= 5) {
                document.getElementById('blood-screen').classList.add('active');
                document.getElementById('main-content').style.filter = "blur(15px) grayscale(100%)";
                setTimeout(()=> document.getElementById('warning-text').style.display='block', 1000);
            } else { alert("迷霧拒絕了你"); }
        }
    }
</script>
</body>
</html>
