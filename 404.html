<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">災禍下的世界 - 設定集</title>
    <style>
        :root {
            --bg-color: #0b0b0c; --card-bg: #161618; --accent-color: #d4af37; 
            --text-color: #c0c0c0; --danger-color: #960000; --blood-red: #660000;
            --ming: #ffffff; --gen1: #a29bfe; --gen2: #81ecec; --gen3: #ff7675;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; margin: 0; line-height: 1.8; overflow-x: hidden; }
        
        /* 主頁面樣式 */
        .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; transition: filter 1s; }
        header { text-align: center; margin-bottom: 60px; }
        h1 { color: var(--accent-color); font-size: 2.5rem; letter-spacing: 10px; margin-bottom: 5px; }
        .main-divider { width: 100px; height: 1px; background: var(--accent-color); margin: 10px auto; opacity: 0.5; }
        .subtitle { letter-spacing: 5px; color: #888; font-size: 1rem; }

        .entry-card { background: var(--card-bg); padding: 25px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #222; cursor: pointer; transition: 0.4s; }
        .entry-card:hover { border-color: var(--accent-color); transform: translateY(-3px); }
        .entry-card h2 { color: var(--accent-color); margin: 0 0 10px; font-size: 1.3rem; letter-spacing: 2px; }
        .entry-card p { font-size: 0.9rem; color: #888; margin: 0; }

        .family-btn { background: #000; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 20px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 1.1rem; letter-spacing: 5px; margin-top: 20px; }

        /* 迷霧與血色 */
        #mist-container { position: relative; width: 100%; height: 300px; margin: 60px 0; background: #050505; border-radius: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; border: 1px solid #333; overflow: hidden; }
        .mist-layer { position: absolute; width: 250%; height: 250%; background: radial-gradient(circle, rgba(100,100,100,0.15) 0%, transparent 60%); filter: blur(50px); animation: drift 20s infinite alternate; }
        @keyframes drift { from { transform: translate(-20%, -20%); } to { transform: translate(10%, 10%); } }
        .mist-text { position: relative; z-index: 10; font-size: 2.2rem; letter-spacing: 15px; color: #fff; opacity: 0.4; }

        /* 血色封鎖層 */
        #blood-screen { position: fixed; top: -120%; left: 0; width: 100%; height: 120%; background: var(--blood-red); z-index: 99999; display: flex; justify-content: center; align-items: center; text-align: center; transition: top 3s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        #blood-screen.active { top: 0; }
        .bloody-warning { color: #fff; font-size: 1.8rem; font-weight: bold; padding: 30px; text-shadow: 0 0 15px #fff; display: none; }

        /* 👁️ 眠的視覺特效 */
        #jumpscare-eye { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100000; display: none; justify-content: center; align-items: center; pointer-events: none; }
        .eye-icon { font-size: 250px; filter: drop-shadow(0 0 60px #f00); }

        /* 彈窗體系 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; overflow-y: auto; backdrop-filter: blur(12px); }
        .modal-content { max-width: 800px; margin: 20px auto; background: #111; padding: 70px 30px 50px; border-radius: 15px; border: 1px solid #333; position: relative; width: 95%; }
        
        /* 🔴 返回按鈕：修正至左上角 */
        .back-nav { 
            position: absolute; top: 20px; left: 25px; 
            color: #777; cursor: pointer; font-size: 0.9rem; 
            border: 1px solid #333; padding: 5px 12px; border-radius: 5px;
            transition: 0.3s; background: #1a1a1a;
        }
        .back-nav:hover { color: var(--accent-color); border-color: var(--accent-color); }
        
        .gen-section { margin-bottom: 40px; }
        .gen-title { color: #444; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 20px; letter-spacing: 3px; font-size: 0.9rem; }
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 15px; }
        .member-circle { width: 75px; height: 75px; border-radius: 50%; border: 2px solid #444; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; background: #000; color: #888; font-size: 0.8rem; text-align: center; }
        .member-circle:hover { border-color: var(--accent-color); color: #fff; }

        .isaac-btn { background: #111 !important; border-color: #121213 !important; color: #121213 !important; cursor: pointer; }

        /* 角色內容 */
        .char-name { font-size: 2.8rem; color: var(--ming); margin: 10px 0 0; letter-spacing: 3px; }
        .char-attr { font-size: 0.9rem; color: #666; margin-bottom: 25px; }
        .char-bio { color: #bbb; font-size: 0.95rem; line-height: 1.8; margin-bottom: 30px; text-align: justify; border-left: 2px solid #333; padding-left: 15px; }
        .skill-item-row { background: #1a1a1c; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .skill-name { color: #eee; font-weight: bold; font-size: 1rem; }
        .skill-brief { color: #666; font-size: 0.8rem; margin-left: 10px; flex-grow: 1; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

<div id="jumpscare-eye"><div class="eye-icon">👁️‍🗨️</div></div>
<div id="blood-screen"><div class="bloody-warning" id="warning-text">世界樹感知到你的去向<br>並封鎖了你的道路</div></div>

<div class="container" id="main-content">
    <header>
        <h1>災禍下的世界</h1>
        <div class="main-divider"></div>
        <p class="subtitle">歷史地理與生存</p>
    </header>

    <section>
        <div class="entry-card" onclick="openDetail('history')"><h2>破碎編年史</h2><p>混沌至亂流，時間在災厄中碎裂，靈魂在輪迴中迷失。</p></div>
        <div class="entry-card" onclick="openDetail('geography')"><h2>異星地理</h2><p>三月同天的奇觀，以及死海潮汐湧動後的血色獵殺。</p></div>
        <div class="entry-card" onclick="openDetail('survival')"><h2>生存命途</h2><p>職業的標籤與獵人的私慾，還有處於交匯處的死神家系。</p></div>
        <button class="family-btn" onclick="openWall()">進入：明空家系檔案</button>
    </section>

    <div id="mist-container" onclick="askPassword()"><div class="mist-layer"></div><div class="mist-text">迷霧籠罩</div></div>
</div>

<div id="detailModal" class="modal"><div class="modal-content"><div class="back-nav" onclick="closeModal('detailModal')">← 返回</div><div id="detailBody"></div></div></div>
<div id="wallModal" class="modal"><div class="modal-content"><div class="back-nav" onclick="closeModal('wallModal')">← 返回</div><div id="wallContent"></div></div></div>
<div id="charModal" class="modal"><div class="modal-content"><div class="back-nav" onclick="backToWall()">← 返回</div><div id="charContent"></div></div></div>
<div id="skillModal" class="modal"><div class="modal-content" style="max-width:500px; border-color:#74b9ff;"><div class="back-nav" onclick="closeModal('skillModal')">← 關閉</div><div id="skillContent"></div></div></div>

<script>
    // --- 修飾資料 ---
    const details = {
        history: { title: "破碎編年史", content: `<div class="card"><p>混沌紀年： 起源未知，無歷史記載。</p><p>日月紀年 (0000~2000)：雙月守護的穩定年代。</p><p>不滅紀年 (000~1327)： 日月族遭獵殺，復仇與火蔓延。</p><p>破碎時代 (1327~1539)： 地獄碎滅，閻王消失，生死邊界溶解。</p><p>時空亂流 (1539~至今)： 靈魂記憶遭抹除，隨機投放於各個時代。</p></div><p>天災無人知曉其起始，帶來疾病與災厄。除精神系外，唯處於界限的「死神」能捕捉靈魂。</p>` },
        geography: { title: "異星天文與死海", content: `<p>世界懸掛火月(紅)、正月(黃)、冰月(藍)。三月各司十夜，重疊引發極大潮。死海會在大潮時湧上陸地，不死生物成群登陸，聖職者需集結獵殺。</p>` },
        survival: { title: "生存命途", content: `<p>職業僅是標籤。冒險者分為：救災（防禦生命）、迷宮（文物探勘）、素材（物資採集）、剿滅（最高風險的私慾獵人）。</p>` }
    };

    const family = [
        { name: "明空", attr: "血肉", gen: 0, bio: "日月本家家主，最後的泯滅死神。為逃避追殺與責任，非必要不展實力。明空家系二三代多為憑依與栖玥利用基因與魂屑培育。全員皆為死神，憑干擾器避開鑑定。", skills: [{n:"死神權能", s:"擷取靈魂。", d:"核心能力，強行剝離目標靈魂。"}, {n:"解放", s:"全力釋放。", d:"完全展開權能。魔力耗盡後，使用者即刻死亡。"}, {n:"牧群", s:"身體分裂。", d:"無限分裂個體，存在突變機率。"}] },
        { name: "芐", attr: "超現實", gen: 1, bio: "原雪山黑貓，牧群復活後遺以後遺症。對外極度冷漠，有極重度依存症，發作時需隨時保持接觸。喜好下雨與純黑。", skills: [{n:"凍結", s:"絕對零度。", d:"視野內凍結萬物。"}, {n:"生生不息", s:"沾水結冰。", d:"落雨後接觸物體瞬間封凍。"}] },
        { name: "語夏", attr: "神系", gen: 1, bio: "饕餮幼獸，主食魂屑。地獄遇明空後隨行至今。", skills: [{n:"胃袋", s:"三維吞噬。", d:"能吞噬實體、空間與靈魂。"}] },
        { name: "憑依", attr: "無", gen: 1, bio: "意識網路AI。統籌家系靈魂數據，利用殘片製造複製個體。二爻、栖玥之創作者。", skills: [{n:"雜訊", s:"精神衝擊。", d:"灌入海量數據使目標精神崩潰。"}] },
        { name: "未央", attr: "超現實", gen: 1, bio: "不死生物。撈取裡世界門扉時被明空拐入。", skills: [{n:"永恆之闇", s:"黑暗控制。", d:"黑暗籠罩並標記追蹤靈魂。"}] },
        { name: "璃", attr: "超現實", gen: 1, bio: "作弊進化的九尾狐。巫女兼藥商。掌控地獄業火。", skills: [{n:"地獄業火", s:"不滅之火。", d:"燃燒視野內任何物體。"}, {n:"餘燼", s:"死後復活。", d:"燃盡後觸發重生的最終手段。"}] },
        { name: "二爻", attr: "超現實", gen: 1, bio: "三色貓人造人。喜好血腥漫畫，能力需冰火平衡。失衡時會轉化為狂暴貓妖。", skills: [{n:"空城/廢土", s:"冰火平衡。", d:"失衡則貓妖化狂暴模式。"}] },
        { name: "日", attr: "靈魂", gen: 1, bio: "狼族長女，暴戾易怒。只在意妹妹。", skills: [{n:"狂化", s:"痛感轉攻。", d:"受傷越重攻擊越高，結束受反噬。"}] },
        { name: "月", attr: "靈魂", gen: 1, bio: "狼族次女。聽覺敏銳，受雜音所擾。依賴姐姐。", skills: [{n:"懸絲傀儡", s:"洗腦操縱。", d:"將他人視為傀儡心智操控。"}] },
        { name: "栖玥", attr: "無/血肉", gen: 1, bio: "球體人造生命。活性儲存臟器。血液呈藍色。", skills: [{n:"靈柩", s:"活性儲存。", d:"臟器活性保存用於醫療。"}] },
        { name: "眠", attr: "靈魂/神系", gen: 1, bio: "超憶症自殺少女。控制前五世屍體。阿卡西紀錄持有者。觀測萬物終焉。", skills: [{n:"完全記憶", s:"能力重現。", d:"重現看過能力的80%強度。"}, {n:"阿卡西紀錄", s:"全知觀測。", d:"紀錄萬物細節，無所遁形。"}] },
        { name: "栞奈", attr: "神系", gen: 1, bio: "瀕死古神，明空吊命封印中。權限分予眠。", skills: [{n:"降臨", s:"瞬移攻擊。", d:"瞬移至信徒旁釋放黑暗衝擊。"}] },
        { name: "小白", attr: "生死", gen: 1, bio: "奈何橋貓，游走生死界限。智力略低。", skills: [{n:"漫長持續", s:"終局引導。", d:"引導目標身心步入凋零。"}] },
        // Gen 2
        { name: "太初", attr: "超現實", gen: 2, bio: "二代老大。負責軍火強化。自然產出個體。", skills: [{n:"冰霧", s:"呼吸凍結。", d:"晶霧入體肺部徹底封凍。"}] },
        { name: "太易", attr: "秩序", gen: 2, bio: "異食症(玻璃)，人格切換產物，精神不穩。稱明空為媽媽。", skills: [{n:"天地翻轉", s:"規則反轉。", d:"翻轉半徑500米內所有規則。"}] },
        { name: "白奈", attr: "神系", gen: 2, bio: "黑色修女，自噬症。收錢治癒的利己者。", skills: [{n:"惡夢纏繞", s:"五秒回溯。", d:"回覆短時間內所有傷害。"}] },
        { name: "黑奈", attr: "神系", gen: 2, bio: "白色修女。死印專家。極其聽姐姐話。自噬症。", skills: [{n:"阿爾忒彌斯", s:"鎖定不死。", d:"絕對鎖定，解除即死。"}] },
        { name: "太歲", attr: "血肉", gen: 2, bio: "吞噬母體出生的怪物。多重編號個體營運家業。", skills: [{n:"血肉同源", s:"複製個體。", d:"長出曾吞噬過的個體。"}, {n:"精神寄生", s:"肉塊操控。", d:"依附肉塊實施精神控制。"}] },
        { name: "希爾維亞", attr: "夢魔", gen: 2, bio: "常識最健全。任職孤兒院。曾受明空救助。", skills: [{n:"高利貸", s:"能力借用。", d:"挪用他人能力，副作用加倍。"}] },
        // Gen 3/4
        { name: "夏雨彤", attr: "精神", gen: 3, bio: "亡者奠。存在感稀薄。負責清理與遺忘。", skills: [{n:"遮天/祠堂", s:"存在抹消。", d:"使目標從世人紀錄中徹底消失。"}] },
        { name: "梅菲斯特", attr: "超現實/精神", gen: 3, bio: "煉金術士。未央之子。試毒後半臉燒傷。製藥廣佈黑市。", skills: [{n:"痛苦轉移", s:"血親轉嫁。", d:"將親族痛苦反饋至自身。"}] },
        { name: "夏詩芸", attr: "感染", gen: 3, bio: "深紅魔女。輪椅上的封印者。血液含凍結病毒。", skills: [{n:"病血", s:"血漿引爆。", d:"遠距引爆不會凝固的血漿炸彈。"}] },
        { name: "閻芊夜", attr: "陰影", gen: 4, bio: "芐女。畏光潛伏。深夜會爬上床。", skills: [{n:"冰凝之影", s:"影子凍結。", d:"從影中移動並從足底凍結。"}] },
        // Hidden
        { name: "以撒", attr: "靈魂", gen: 4, bio: "No.23。22片碎魂召喚，紀錄終結者。", skills: [{n:"虛無召喚", s:"歸於虛無。", d:"一切文字回歸空無。"}] }
    ];

    let viewedSet = new Set(); // 重新整理即歸零

    function openWall() {
        const wall = document.getElementById('wallContent');
        wall.innerHTML = `
            <div class="gen-section"><h3 class="gen-title">起源</h3><div class="member-grid"><div class="member-circle" style="border-color:white; color:white; width:85px; height:85px; font-size:1rem;" onclick="showChar(0)">明空</div></div></div>
            <div class="gen-section"><h3 class="gen-title">第一世代</h3><div class="member-grid" id="g1"></div></div>
            <div class="gen-section"><h3 class="gen-title">第二世代</h3><div class="member-grid" id="g2"></div></div>
            <div class="gen-section"><h3 class="gen-title">第三與第四世代</h3><div class="member-grid" id="g34"></div></div>
        `;
        family.forEach((m, i) => {
            if(i === 0 || i === 23) return;
            const div = document.createElement('div');
            div.className = "member-circle";
            const color = m.gen === 1 ? "var(--gen1)" : m.gen === 2 ? "var(--gen2)" : "var(--gen3)";
            div.style.borderColor = color; div.style.color = color; div.innerText = m.name;
            div.onclick = () => showChar(i);
            let targetId = (m.gen === 1) ? 'g1' : (m.gen === 2) ? 'g2' : 'g34';
            document.getElementById(targetId).appendChild(div);
        });
        if(viewedSet.size >= 23) {
            const isaac = document.createElement('div');
            isaac.className = "member-circle isaac-btn"; isaac.innerText = "以撒";
            isaac.onclick = () => showChar(23);
            document.getElementById('g34').appendChild(isaac);
        }
        document.getElementById('wallModal').style.display = 'block';
    }

    function showChar(idx) {
        if(idx < 23) viewedSet.add(idx);
        const c = family[idx];
        if (c.name === "眠") {
            document.getElementById('jumpscare-eye').style.display = 'flex';
            setTimeout(() => { document.getElementById('jumpscare-eye').style.display = 'none'; }, 100);
            document.title = "I'm watching you";
            try { history.replaceState(null, "", "Im-watching-you"); } catch(e) {}
        } else { resetTitle(); }

        const content = document.getElementById('charContent');
        let sHtml = c.skills.map(s => `<div class="skill-item-row" onclick="showSkill('${s.n}', '${s.d}')"><span class="skill-name">${s.n}</span><span class="skill-brief">${s.s}</span><span style="color:var(--accent-color); font-size:0.7rem; opacity:0.5;">詳情 &rsaquo;</span></div>`).join('');
        content.innerHTML = `<h1 class="char-name" style="color:${idx===0?'white':'var(--accent-color)'}">${c.name}</h1><div class="char-attr">屬性：${c.attr}</div><div class="char-bio">${c.bio}</div><h4 style="margin:0 0 15px; color:#444; font-size:0.8rem; letter-spacing:2px;">能力體系</h4>${sHtml}`;
        document.getElementById('charModal').style.display = 'block';
    }

    function openDetail(s) { document.getElementById('detailBody').innerHTML = `<h2 style="color:var(--accent-color); border-bottom:1px solid #333; padding-bottom:10px; margin:0 0 20px; letter-spacing:2px;">${details[s].title}</h2>${details[s].content}`; document.getElementById('detailModal').style.display = 'block'; }
    function resetTitle() { document.title = "災禍下的世界 - 設定集"; try { history.replaceState(null, "", "/"); } catch(e) {} }
    function backToWall() { resetTitle(); closeModal('charModal'); openWall(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; resetTitle(); }
    function showSkill(n, d) { document.getElementById('skillContent').innerHTML = `<h3 style="color:var(--accent-color); margin-top:10px;">${n}</h3><p style="color:#bbb; line-height:1.8;">${d}</p>`; document.getElementById('skillModal').style.display = 'block'; }

    let fails = 0;
    const part2HTML = `<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>禁忌資料</title><style>body { background:#0b0b0c; color:#c0c0c0; font-family:sans-serif; padding:40px; } h1, h2 { color:#d4af37; } .card { background:#161618; padding:20px; border-radius:10px; border:1px solid #333; margin-bottom:20px; }</style></head><body><h1>災禍下的世界 - 禁忌資料</h1><div class="card"><h2>十王與殼</h2><p>這裡是世界樹不願讓人知曉的祕密...</p></div></body></html>`;

    function askPassword() {
        if(document.getElementById('blood-screen').classList.contains('active')) return;
        const pw = prompt("是否要前往迷霧之外");
        if (pw === "1101116") {
            const blob = new Blob([part2HTML], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        } else {
            fails++;
            if(fails >= 5) {
                document.getElementById('blood-screen').classList.add('active');
                document.getElementById('main-content').style.filter = "blur(15px) grayscale(100%)";
                setTimeout(()=> document.getElementById('warning-text').style.display='block', 1000);
            } else { alert("迷霧拒絕了你"); }
        }
    }
</script>
</body>
</html>
