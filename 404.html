<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>I'm watching you</title>
    <script>
      // 這是禁忌的傳送術：當 404 發生時，自動去抓 index.html 的內容來顯示
      fetch('index.html')
        .then(response => response.text())
        .then(html => {
          document.open();
          document.write(html);
          document.close();
        });
    </script>
  </head>
  <body>
  </body>
</html>
