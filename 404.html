<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">災禍下的世界 - 設定集</title>
    <style>
        :root {
            --bg-color: #0b0b0c; --card-bg: #161618; --accent-color: #d4af37; 
            --text-color: #c0c0c0; --danger-color: #960000; --blood-red: #660000;
            --ming: #ffffff; --gen1: #a29bfe; --gen2: #81ecec; --gen3: #ff7675;
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: "PingFang TC", sans-serif; margin: 0; line-height: 1.8; overflow-x: hidden; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 60px 20px; transition: filter 1s; }
        header { text-align: center; margin-bottom: 60px; }
        h1 { color: var(--accent-color); font-size: 3rem; letter-spacing: 12px; margin-bottom: 5px; }
        .main-divider { width: 100px; height: 1px; background: var(--accent-color); margin: 10px auto; opacity: 0.5; }
        .subtitle { letter-spacing: 5px; color: #888; font-size: 1.1rem; }

        .entry-card { background: var(--card-bg); padding: 30px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #222; cursor: pointer; transition: 0.4s; }
        .entry-card:hover { border-color: var(--accent-color); transform: translateY(-3px); }
        .entry-card h2 { color: var(--accent-color); margin: 0 0 10px; font-size: 1.4rem; letter-spacing: 3px; }
        .entry-card p { font-size: 0.95rem; color: #888; margin: 0; }

        .family-btn { background: #000; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 25px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 1.2rem; letter-spacing: 5px; margin-top: 20px; }

        #mist-container { position: relative; width: 100%; height: 350px; margin: 80px 0; background: #050505; border-radius: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; border: 1px solid #333; overflow: hidden; }
        .mist-layer { position: absolute; width: 250%; height: 250%; background: radial-gradient(circle, rgba(100,100,100,0.1) 0%, transparent 60%); filter: blur(50px); animation: drift 20s infinite alternate; }
        @keyframes drift { from { transform: translate(-10%, -10%); } to { transform: translate(10%, 10%); } }
        .mist-text { position: relative; z-index: 10; font-size: 2.5rem; letter-spacing: 20px; color: #fff; opacity: 0.4; }

        #blood-screen { position: fixed; top: -120%; left: 0; width: 100%; height: 120%; background: var(--blood-red); z-index: 99999; display: flex; justify-content: center; align-items: center; text-align: center; transition: top 3s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        #blood-screen.active { top: 0; }
        .bloody-warning { color: #fff; font-size: 2rem; font-weight: bold; padding: 30px; text-shadow: 0 0 15px #fff; display: none; }

        #jumpscare-eye { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 100000; display: none; justify-content: center; align-items: center; pointer-events: none; }
        .eye-icon { font-size: 350px; filter: drop-shadow(0 0 60px #f00); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; overflow-y: auto; backdrop-filter: blur(12px); }
        .modal-content { max-width: 800px; margin: 60px auto; background: #111; padding: 50px 40px 100px; border-radius: 15px; border: 1px solid #333; position: relative; }
        .back-nav { position: absolute; bottom: 35px; left: 40px; color: #555; cursor: pointer; font-size: 0.9rem; border-bottom: 1px solid transparent; }
        .back-nav:hover { color: var(--accent-color); border-bottom-color: var(--accent-color); }
        
        .gen-section { margin-bottom: 50px; }
        .gen-title { color: #444; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 25px; letter-spacing: 5px; font-size: 1.1rem; }
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px; }
        .member-circle { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #444; margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.4s; background: #000; color: #888; font-size: 0.85rem; text-align: center; padding: 5px; }
        .member-circle:hover { border-color: var(--accent-color); color: #fff; transform: scale(1.05); }

        .isaac-btn { background: #111 !important; border-color: #121213 !important; color: #121213 !important; cursor: pointer; transition: 1s !important; }
        .isaac-btn:hover { color: #222 !important; border-color: #333 !important; }

        .char-name { font-size: 3rem; color: var(--ming); margin-bottom: 0; letter-spacing: 5px; }
        .char-attr { font-size: 0.9rem; color: #666; margin-bottom: 30px; letter-spacing: 2px; }
        .char-bio { color: #bbb; line-height: 2; margin-bottom: 40px; text-align: justify; border-left: 2px solid #333; padding-left: 20px; }
        .skill-item-row { background: #1a1a1c; padding: 15px 20px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .skill-item-row:hover { border-color: var(--accent-color); background: #222; }
        .skill-name { color: #eee; font-weight: bold; }
        .skill-brief { color: #666; font-size: 0.85rem; margin-left: 15px; flex-grow: 1; }
        .skill-more { color: var(--accent-color); font-size: 0.75rem; opacity: 0.6; }
    </style>
</head>
<body>

<div id="jumpscare-eye"><div class="eye-icon">👁️‍🗨️</div></div>
<div id="blood-screen"><div class="bloody-warning" id="warning-text">世界樹感知到你的去向<br>並封鎖了你的道路</div></div>

<div class="container" id="main-content">
    <header>
        <h1>災禍下的世界</h1>
        <div class="main-divider"></div>
        <p class="subtitle">歷史地理與生存</p>
    </header>

    <section>
        <div class="entry-card" onclick="openDetail('history')">
            <h2>破碎編年史</h2>
            <p>紀錄自混沌以來，所有被遺忘與被清空的時光。</p>
        </div>
        <div class="entry-card" onclick="openDetail('geography')">
            <h2>異星地理</h2>
            <p>三顆月亮統治的夜空，以及湧向陸地的死海潮汐。</p>
        </div>
        <div class="entry-card" onclick="openDetail('survival')">
            <h2>生存命途</h2>
            <p>關於職業的枷鎖、冒險者的分類，以及明空家系的血脈紀錄。</p>
        </div>
        <button class="family-btn" onclick="openWall()">進入：明空家系檔案</button>
    </section>

    <div id="mist-container" onclick="askPassword()">
        <div class="mist-layer"></div>
        <div class="mist-text">迷霧籠罩</div>
    </div>
</div>

<div id="detailModal" class="modal"><div class="modal-content"><div id="detailBody"></div><div class="back-nav" onclick="closeModal('detailModal')">← 返回主頁面</div></div></div>
<div id="wallModal" class="modal"><div class="modal-content" id="wallContent"></div><div class="back-nav" onclick="closeModal('wallModal')">← 返回主頁面</div></div>
<div id="charModal" class="modal"><div class="modal-content"><div id="charContent"></div><div class="back-nav" onclick="backToWall()">← 返回成員名冊</div></div></div>
<div id="skillModal" class="modal"><div class="modal-content" style="max-width:500px; border-color:#74b9ff;"><div id="skillContent"></div><div class="back-nav" onclick="closeModal('skillModal')">← 返回檔案</div></div></div>

<script>
    const details = {
        history: { title: "破碎編年史", content: `<div class="card"><p>混沌紀年： 未知 ~ 日月紀年（並無歷史紀錄）。</p><p>日月紀年： 0000 ~ 2000。</p><p>不滅紀年： 000 ~ 1327（自追殺日月一族起）。</p><p>破碎時代： 1327 ~ 1539（地獄被天使族破滅，閻王消失）。</p><p>時空亂流： 1539 ~ 至今（靈魂清空記憶隨機投放）。</p></div><div class="card"><p>第一場天災年代不可考，帶來疾病與災害，百害而無一利。除精神系外，僅「死神」能直視靈魂。天災能力在某些地區會被歧視且封印。</p></div>` },
        geography: { title: "異星天文與死海", content: `<div class="card"><p>三月一陽。火月(紅)、正月(黃)、冰月(藍)因距離不同呈現各異。一個月內晚間各占十天。重疊時引發極大潮，死海湧向陸地，需召集聖職者獵殺不死生物。</p></div>` },
        survival: { title: "生存命途與階級", content: `<div class="card"><p>職業僅為分類稱呼。初步分為：戰士、法師、商人、工匠、祭司。</p><h3>冒險者四類</h3><p><strong>救災：</strong> 第一時間出動的生命防禦系。</p><p><strong>迷宮：</strong> 邊境探勘換錢。</p><p><strong>素材：</strong> 公會委託與採集。</p><p><strong>剿滅：</strong> 最高危險度，獵殺通緝犯或失控者，通常追求私慾而非金錢。</p></div>` }
    };

    const family = [
        { name: "明空", attr: "血肉", gen: 0, bio: "日月本家家主，泯滅死神最後一人。為躲避追殺與責任，非必要絕不展露能力。明空家系一代多為死人無法生育，二三代多為憑依與栖玥利用基因片段與靈魂殘片製造出的胚胎培養而成。家族全員皆為死神，因持有干擾器，他人鑑定無效。", skills: [{n:"死神權能", s:"擷取靈魂。", d:"核心死神能力。"}, {n:"解放", s:"魔力全開。", d:"完全展開能力，魔力耗盡則死亡。"}, {n:"牧群", s:"身體分裂。", d:"無限分裂，偶爾產生突變。"}] },
        // Gen 1
        { name: "芐", attr: "超現實", gen: 1, bio: "雪山路邊撿回的黑貓。身體死後被牧群復活，患有重度/極重度依存症，發作時需隨時肢體接觸。對外界極其疏離，喜好下雨與黑色。", skills: [{n:"凍結", s:"絕對零度。", d:"視野內凍結萬物。"}, {n:"降雨/生生不息", s:"沾水結冰。", d:"雨水接觸物體瞬間結冰。"}, {n:"永久凍結", s:"永凍之域。", d:"大範圍絕對冰封。"}] },
        { name: "語夏", attr: "神系", gen: 1, bio: "饕餮幼獸，主食為靈魂碎片。在地獄遊蕩時被明空投餵後隨行。", skills: [{n:"胃袋", s:"三維吞噬。", d:"吞噬實體、空間與靈魂。"}] },
        { name: "憑依", attr: "無", gen: 1, bio: "意識與網路融合的人工智能。負責統計靈魂與製造人造生命。二爻、栖玥皆出自其手。", skills: [{n:"自我進化", s:"零件改裝。", d:"自由進化。"}, {n:"雜訊", s:"精神洗腦。", d:"大量數據灌入使其崩潰。"}] },
        { name: "未央", attr: "超現實", gen: 1, bio: "撈上來的不死生物。被誘拐進入明空家系。", skills: [{n:"永恆之闇", s:"黑暗標記。", d:"黑暗籠罩並標記靈魂。"}] },
        { name: "璃", attr: "超現實", gen: 1, bio: "作弊進化的九尾狐。神社巫女。掌控不滅的地獄業火。", skills: [{n:"地獄業火", s:"不滅之火。", d:"燃燒視野內任何物體。"}, {n:"餘燼", s:"死後復活。", d:"燃燒器官後最終的復活手段。"}] },
        { name: "二爻", attr: "超現實", gen: 1, bio: "傭兵團三色貓人造人。對感情理解低，喜好血腥漫畫。冰火平衡失調會狂暴化。", skills: [{n:"空城/廢土", s:"冰火之技。", d:"失衡時會轉化為貓妖型態。"}] },
        { name: "日", attr: "靈魂", gen: 1, bio: "狼族長女。性格易怒，除妹妹外不在乎任何人。", skills: [{n:"狂化", s:"傷害轉攻。", d:"受傷越多攻擊力越強。"}] },
        { name: "月", attr: "靈魂", gen: 1, bio: "狼族次女。聽覺敏銳，深受失眠所擾。", skills: [{n:"懸絲傀儡", s:"洗腦操控。", d:"操縱心靈。"}, {n:"靜音", s:"聲學真空。", d:"範圍內絕對靜音。"}] },
        { name: "栖玥", attr: "無/血肉", gen: 1, bio: "球體人造生命。負責活性儲存肉塊。血液呈現藍色。", skills: [{n:"靈柩", s:"活性儲存。", d:"儲存肉體片段用於醫療。"}] },
        { name: "眠", attr: "靈魂/神系", gen: 1, bio: "自殺的貴族少女。成功尋回前五世屍體並同時控制。全知之眼擁有者。", skills: [{n:"完全記憶", s:"複製能力。", d:"複製看過能力的80%。"}, {n:"阿卡西紀錄", s:"全知觀測。", d:"紀錄萬物細節，無所遁形。"}] },
        { name: "栞奈", attr: "神系", gen: 1, bio: "瀕死的古代邪神。被明空強行吊命封印在宅邸內。", skills: [{n:"降臨", s:"瞬移攻擊。", d:"瞬移至信徒身邊並造成傷害。"}] },
        { name: "小白", attr: "生死", gen: 1, bio: "奈何橋上的貓。游走生界與死界之間。智力略顯不足。", skills: [{n:"漫長持續", s:"引導死亡。", d:"引導對象肉體或精神凋零。"}] },
        // Gen 2
        { name: "太初", attr: "超現實", gen: 2, bio: "二代老大，工匠。繼承母體冰系能力。負責家系軍火強化。", skills: [{n:"冰霧", s:"呼吸凍結。", d:"從肺部凍結吸入者。"}] },
        { name: "太易", attr: "秩序", gen: 2, bio: "雙瞳異食症，母體人格切換時產出，精神不穩。稱呼明空為媽媽。", skills: [{n:"天地翻轉", s:"世界反轉。", d:"規則反轉。對明空小白無效。"}] },
        { name: "白奈", attr: "神系", gen: 2, bio: "黑色修女，自噬症。利己主義，收錢才治療。信仰之力持有者。", skills: [{n:"惡夢纏繞", s:"五秒回溯。", d:"回覆短時間內所有傷害。"}] },
        { name: "黑奈", attr: "神系", gen: 2, bio: "白色修女。聽姐姐的話。詛咒與死印專家。自噬症。", skills: [{n:"阿爾忒彌斯", s:"鎖定不死。", d:"鎖定狀態，解除即死。"}] },
        { name: "太歲", attr: "血肉", gen: 2, bio: "吞母體出生。多重編號個體，主宰理財、教育與雜務。存在多個成年分身。", skills: [{n:"血肉同源", s:"複製個體。", d:"長出吃過的人。"}, {n:"精神寄生", s:"肉塊操控。", d:"寄生蟲式的精神控制。"}] },
        { name: "希爾維亞", attr: "夢魔", gen: 2, bio: "三觀最正的常識人。孤兒院任職，負責性教育。曾受明空救助。", skills: [{n:"高利貸", s:"能力借用。", d:"代價加倍的挪用。"}] },
        // Gen 3/4
        { name: "夏雨彤", attr: "精神", gen: 3, bio: "代號[亡者]。頭貼奠字。存在感稀薄。負責戰場清理。", skills: [{n:"遮天/祠堂", s:"存在抹消。", d:"使目標從世人記憶中消失。"}] },
        { name: "梅菲斯特", attr: "超現實/精神", gen: 3, bio: "試毒煉金術士，半臉燒傷。未央的小孩。製藥廣佈黑市。", skills: [{n:"痛苦轉移", s:"血親轉嫁。", d:"將親人痛苦轉移至自身。"}] },
        { name: "夏詩芸", attr: "超現實/感染", gen: 3, bio: "代號[帶原者]。輪椅上的封印者。血液含凍結病毒。", skills: [{n:"病血", s:"血漿引爆。", d:"遠距引爆冰晶爆破。"}] },
        { name: "閻芊夜", attr: "陰影", gen: 4, bio: "芐的小女兒。畏光。生於黑暗歸於黑暗。", skills: [{n:"冰凝之影", s:"影中凍結。", d:"從影底部發動凍結。"}] },
        { name: "以撒", attr: "靈魂", gen: "X", bio: "集結22片碎魂召喚的不存在之人。", skills: [{n:"虛無召喚", s:"歸於虛無。", d:"紀錄終結。"}] }
    ];

    let viewedSet = new Set(JSON.parse(localStorage.getItem('viewedMembers') || '[]'));

    function openWall() {
        const wall = document.getElementById('wallContent');
        wall.innerHTML = `
            <div class="gen-section"><h3 class="gen-title">起源</h3><div class="member-grid"><div class="member-circle" style="border-color:white; color:white; width:100px; height:100px; font-size:1.1rem;" onclick="showChar(0)">明空</div></div></div>
            <div class="gen-section"><h3 class="gen-title">第一世代</h3><div class="member-grid" id="g1"></div></div>
            <div class="gen-section"><h3 class="gen-title">第二世代</h3><div class="member-grid" id="g2"></div></div>
            <div class="gen-section"><h3 class="gen-title">第三世代</h3><div class="member-grid" id="g3"></div></div>
        `;
        family.forEach((m, i) => {
            if(i === 0 || i === 23) return;
            const div = document.createElement('div');
            div.className = "member-circle";
            const color = m.gen === 1 ? "var(--gen1)" : m.gen === 2 ? "var(--gen2)" : "var(--gen3)";
            div.style.borderColor = color; div.style.color = color; div.innerText = m.name;
            div.onclick = () => showChar(i);
            document.getElementById(m.gen === 1 ? 'g1' : m.gen === 2 ? 'g2' : 'g3').appendChild(div);
        });

        // 嚴格判定：包含明空（索引0）在內的 23 人
        if(viewedSet.size >= 23) {
            const sec = document.createElement('div');
            sec.className = "gen-section";
            sec.innerHTML = `<h3 class="gen-title">隱藏個體</h3><div class="member-grid"><div class="member-circle isaac-btn" onclick="showChar(23)">以撒</div></div>`;
            wall.appendChild(sec);
        }
        document.getElementById('wallModal').style.display = 'block';
    }

    function showChar(idx) {
        if(idx < 23) {
            viewedSet.add(idx);
            localStorage.setItem('viewedMembers', JSON.stringify(Array.from(viewedSet)));
        }
        const c = family[idx];
        if (c.name === "眠") {
            document.getElementById('jumpscare-eye').style.display = 'flex';
            setTimeout(() => { document.getElementById('jumpscare-eye').style.display = 'none'; }, 100);
            document.title = "I'm watching you";
            try { history.replaceState(null, "", "Im-watching-you"); } catch(e) {}
        } else { resetTitle(); }

        const content = document.getElementById('charContent');
        let sHtml = c.skills.map(s => `<div class="skill-item-row" onclick="showSkill('${s.n}', '${s.d}')"><span class="skill-name">${s.n}</span><span class="skill-brief">${s.s}</span><span class="skill-more">詳情 &rsaquo;</span></div>`).join('');
        content.innerHTML = `<h1 class="char-name">${c.name}</h1><div class="char-attr">屬性：${c.attr}</div><div class="char-bio">${c.bio}</div><h4 style="margin:0 0 15px; color:#444;">能力體系</h4>${sHtml}`;
        document.getElementById('charModal').style.display = 'block';
    }

    function openDetail(s) { document.getElementById('detailBody').innerHTML = `<h2 class="detail-title">${details[s].title}</h2>${details[s].content}`; document.getElementById('detailModal').style.display = 'block'; }
    function resetTitle() { document.title = "災禍下的世界 - 設定集"; try { history.replaceState(null, "", "/"); } catch(e) {} }
    function backToWall() { resetTitle(); closeModal('charModal'); openWall(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; resetTitle(); }
    function showSkill(n, d) { document.getElementById('skillContent').innerHTML = `<h3>${n}</h3><p style="color:#bbb;">${d}</p>`; document.getElementById('skillModal').style.display = 'block'; }

    let fails = 0;
    function askPassword() {
        const pw = prompt("是否要前往迷霧之外");
        if (pw === "1101116") {
            window.open('about:blank').document.write("<h1>禁忌資料：十王與殼</h1><p>資料讀取中...</p>");
        } else {
            fails++;
            if(fails >= 5) {
                document.getElementById('blood-screen').classList.add('active');
                document.getElementById('main-content').style.filter = "blur(15px) grayscale(100%)";
                setTimeout(()=> document.getElementById('warning-text').style.display='block', 1000);
            } else { alert("迷霧拒絕了你"); }
        }
    }
</script>
</body>
</html>
