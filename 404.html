<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">災禍下的世界 - 設定集</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --card-bg: #161618;
            --accent-color: #d4af37; 
            --text-color: #c0c0c0;
            --danger-color: #960000;
            --blood-red: #660000;
            /* 世代顏色 */
            --gen1: #a29bfe; --gen2: #81ecec; --gen3: #ff7675; --gen4: #fab1a0;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "PingFang TC", "Noto Sans TC", sans-serif;
            margin: 0; padding: 0; line-height: 1.7;
            overflow-x: hidden;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; transition: filter 1s; }
        header { text-align: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 20px; margin-bottom: 50px; }
        h1 { color: var(--accent-color); font-size: 2.5rem; letter-spacing: 6px; }
        h2 { color: var(--accent-color); border-left: 4px solid var(--accent-color); padding-left: 15px; margin: 40px 0 20px; }
        
        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #222;
        }

        /* 明空家入口 */
        .family-entry-btn {
            background: linear-gradient(135deg, #222, #000);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 20px; width: 100%; border-radius: 10px; cursor: pointer;
            font-size: 1.2rem; letter-spacing: 3px; transition: 0.3s;
        }

        /* 迷霧與血色鎖定 */
        #mist-container { position: relative; width: 100%; height: 350px; margin: 60px 0; background: #050505; border-radius: 20px; cursor: pointer; display: flex; justify-content: center; align-items: center; border: 1px solid #333; overflow: hidden; }
        .mist-layer { position: absolute; width: 250%; height: 250%; background: radial-gradient(circle, rgba(100,100,100,0.15) 0%, transparent 60%); filter: blur(50px); animation: drift 15s infinite alternate ease-in-out; }
        @keyframes drift { 0% { transform: translate(-20%, -20%); } 100% { transform: translate(10%, 10%); } }
        .mist-text { position: relative; z-index: 10; font-size: 2.8rem; letter-spacing: 20px; color: #fff; opacity: 0.6; font-weight: bold; }

        /* 血色封鎖 */
        #blood-screen { position: fixed; top: -110%; left: 0; width: 100%; height: 110%; background: var(--blood-red); z-index: 9999; display: flex; justify-content: center; align-items: center; transition: top 3s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        #blood-screen.active { top: 0; }
        .bloody-warning { color: #fff; font-size: 2.2rem; font-weight: bold; text-shadow: 0 0 15px #fff; text-align: center; display: none; padding: 20px; line-height: 1.5; }

        /* 眼睛閃現層 */
        #jumpscare-eye {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 99999;
            display: none; /* 預設隱藏 */
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }
        .eye-icon {
            font-size: 300px;
            color: #fff;
            filter: drop-shadow(0 0 50px #ff0000);
            animation: eyePulse 0.1s infinite;
        }
        @keyframes eyePulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* 彈窗導航系統 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; overflow-y: auto; backdrop-filter: blur(8px); }
        .modal-content { max-width: 800px; margin: 40px auto; background: #1a1a1b; padding: 40px 30px 80px; border-radius: 15px; border: 1px solid #333; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        
        .back-nav {
            position: absolute; bottom: 30px; left: 30px;
            color: #555; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
            border-bottom: 1px solid transparent; padding: 5px 0;
        }
        .back-nav:hover { color: var(--accent-color); border-bottom: 1px solid var(--accent-color); }

        /* 成員牆 */
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 20px; margin-top: 20px; }
        .member-circle {
            width: 80px; height: 80px; border-radius: 50%; border: 2px solid #444;
            margin: 0 auto; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.4s; font-size: 0.9rem; background: #111; color: #aaa;
        }
        .member-circle:hover { border-color: var(--accent-color); color: #fff; transform: translateY(-5px); }

        /* 以撒隱藏邏輯 (背景極致相似) */
        .isaac-wrapper { display: none; }
        .isaac-btn {
            background-color: #1a1a1b !important;
            border: 1px solid #1d1d1e !important;
            color: #1e1e1f !important;
            transition: color 2s !important;
        }
        .isaac-btn:hover { color: #333 !important; }

        /* 角色排版 */
        .char-title-quote { font-style: italic; color: var(--accent-color); font-size: 1.2rem; margin-bottom: 20px; display: block; opacity: 0.8; }
        .char-bio { background: #111; padding: 20px; border-radius: 8px; margin-bottom: 30px; border-left: 2px solid #333; font-size: 0.95rem; }
        .skill-summary-card {
            background: #222; padding: 15px; border-radius: 5px; margin-bottom: 10px;
            border-left: 3px solid var(--accent-color); cursor: pointer; transition: 0.2s;
        }
        .skill-summary-card:hover { background: #2a2a2c; transform: translateX(5px); }
    </style>
</head>
<body>

<div id="jumpscare-eye">
    <div class="eye-icon">👁️‍🗨️</div>
</div>

<div id="blood-screen"><div class="bloody-warning" id="warning-text">世界樹感知到你的去向<br>並封鎖了你的道路</div></div>

<div class="container" id="main-content">
    <header><h1>災禍下的世界</h1><p>第一部分：生存法則與家系名冊</p></header>
    <section>
        <h2>⚖️ 生存者：明空一族</h2>
        <div class="card">
            <p>點擊按鈕查看檔案。只有看過所有靈魂的人，才能在迷霧中生存。</p>
            <button class="family-entry-btn" onclick="openWall()">進入：明空家系成員檔案</button>
        </div>
        <div class="card"><h3>🌍 地理與災害簡述</h3><p>歷史：日月、不滅、破碎、時空。分區：世界樹、死海、迷宮。屬性：覺、妖、魔、肉。</p></div>
    </section>
    
    <div id="mist-container" onclick="askPassword()"><div class="mist-layer"></div><div class="mist-text">迷霧籠罩</div></div>
</div>

<div id="wallModal" class="modal">
    <div class="modal-content">
        <h2 style="text-align:center; color:var(--accent-color); margin-bottom:30px;">明空家系檔案</h2>
        <div class="member-grid" id="memberGrid"></div>
        <div class="back-nav" onclick="closeModal('wallModal')">← 回到主頁面</div>
    </div>
</div>

<div id="charModal" class="modal">
    <div class="modal-content">
        <div id="charContent"></div>
        <div class="back-nav" onclick="backToWall()">← 回到成員名冊</div>
    </div>
</div>

<div id="skillModal" class="modal">
    <div class="modal-content" style="max-width:500px; border-color:#74b9ff;">
        <div id="skillContent"></div>
        <div class="back-nav" onclick="closeModal('skillModal')">← 返回角色生平</div>
    </div>
</div>

<script>
    let viewedSet = new Set();
    const defaultTitle = "災禍下的世界 - 設定集";

    const family = [
        { name: "明空", title: "日月家主 / 泯滅死神最後一人", gen: 1, info: "日月本家家主。逃避責任中。平常出門只會帶芐。", skills: [{n:"死神權能", s:"擷取靈魂。", d:"核心權能。"}, {n:"解放", s:"最大馬力展開。", d:"代價是生命耗盡。"}] },
        { name: "芐", title: "永久凍結的黑貓", gen: 1, info: "身體已死，復活後帶有後遺症。有重度依存症。", skills: [{n:"凍結", s:"絕對零度。", d:"凍結視野內所有物體。"}] },
        { name: "語夏", title: "饕餮幼獸", gen: 1, info: "主食是靈魂碎片。日月紀年時被明空投餵後跟隨。", skills: [{n:"胃袋", s:"無上限空間。", d:"吃實體、空間、靈魂。"}] },
        { name: "憑依", title: "人工智能網路意識", gen: 1, info: "意識與網路融合，負責統計靈魂。熱衷於製造複製人。", skills: [{n:"雜訊", s:"數據洗腦。", d:"數據灌入精神產生混亂。"}] },
        { name: "未央", title: "永恆之闇 / 不死生物", gen: 1, info: "撈上來的不死生物。聽說明空家要什麼有什麼就被拐跑了。", skills: [{n:"永恆之闇", s:"黑暗遮蔽。", d:"百米黑暗籠罩，控制無機物。"}] },
        { name: "璃", title: "九尾狐巫女", gen: 1, info: "靠明空能力拿到九尾。在神社當巫女順便賣藥。", skills: [{n:"地獄業火", s:"不滅之火。", d:"燒毀視野內任何物體。"}] },
        { name: "二爻", title: "異端審問官 / 人造人三色貓", gen: 1, info: "對感情理解不高。技能必須平衡搭配。", skills: [{n:"廢土", s:"火/光屬性。", d:"單獨發動。"}, {n:"空城", s:"冰/暗屬性。", d:"必須搭配廢土。"}] },
        { name: "日", title: "狼族長女 / 狂化者", gen: 1, info: "狼族，死後被撿走靈魂。除了妹妹誰都不在乎。", skills: [{n:"狂化", s:"痛感增幅。", d:"受傷越多攻擊力越強。"}] },
        { name: "月", title: "狼族次女 / 懸絲傀儡", gen: 1, info: "聽力極佳，晚上常因聲響失眠。", skills: [{n:"懸絲傀儡", s:"精神洗腦。", d:"操縱他人的心靈。"}] },
        { name: "栖玥", title: "血肉靈柩 / 無限符號", gen: 1, info: "球體人造生命。負責活性儲存肉塊，血液藍色。", skills: [{n:"靈柩", s:"臟器活性儲存。", d:"活性保存內臟與肉塊。"}] },
        { name: "眠", title: "超憶症少女 / 狂信徒", gen: 1, info: "因超憶症自殺。現控制五世屍體戰鬥。全知全覺之眼。成功把過去五世的屍體都找了回來。", skills: [{n:"完全記憶", s:"複製能力。", d:"複製能力80%強度。"}, {n:"阿卡西紀錄", s:"全知感應。", d:"紀錄萬物細節，連螞蟻爬過都知道。"}] },
        { name: "栞奈", title: "古代邪神 / 被封印之神", gen: 1, info: "快消散前被明空吊命。能力分給了信徒眠。", skills: [{n:"阿卡西紀錄-前", s:"能力剝奪。", d:"將別人的能力變成書並分配。"}] },
        { name: "小白", title: "奈何橋上的貓 / 生死之間", gen: 1, info: "介於生死之間。智力略顯不足。", skills: [{n:"萌芽/綻放", s:"死亡引導。", d:"引發對象疑病或錯覺。"}] },
        { name: "太初", title: "工匠老大 / 冰系自然產", gen: 2, info: "負責強化武器。雙眼特殊但非魅魔。", skills: [{n:"冰霧", s:"呼吸凍結。", d:"吸入體內凍結肺部。"}] },
        { name: "太易", title: "逆王 / 隨心", gen: 2, info: "右眼雙瞳，吃玻璃。精神不穩。會叫明空媽媽。", skills: [{n:"天地翻轉", s:"規則反轉。", d:"規則強行反轉。"}] },
        { name: "白奈", title: "黑色修女 / 咬尾蛇", gen: 2, info: "收錢才治療。消耗信仰之力回溯傷害。", skills: [{n:"惡夢纏繞", s:"五秒回溯。", d:"回覆五秒內受到的傷害。"}] },
        { name: "黑奈", title: "白色修女 / 消耗", gen: 2, info: "詛咒系修女。同生共死咒印。", skills: [{n:"阿爾忒彌斯的祝福", s:"絕對不死。", d:"解除印記瞬間死亡。"}] },
        { name: "太歲", title: "血肉主宰 / 萬物歸一", gen: 2, info: "多重編號個體。主修理財、教育與雜務。", skills: [{n:"血肉同源", s:"長出個體。", d:"吃過誰就能長出誰。"}] },
        { name: "希爾維亞", title: "夢魔 / 常識人", gen: 2, info: "魅魔外貌但三觀最正。負責孤兒院與性教育。", skills: [{n:"高利貸", s:"能力挪用。", d:"代價加倍的能力挪用。"}] },
        { name: "夏雨彤", title: "亡者 / 奠", gen: 3, info: "負責戰場清理。讓人遺忘的存在。", skills: [{n:"遮天/祠堂", s:"存在抹消。", d:"抹消物體存在並儲存。"}] },
        { name: "梅菲斯特", title: "犧牲 / 煉金術士", gen: 3, info: "試毒與製藥。愛錢如命。未央的小孩。", skills: [{n:"痛苦轉移", s:"轉移血親痛。", d:"親人傷害轉嫁自身。"}] },
        { name: "夏詩芸", title: "深紅魔女 / 帶原者", gen: 3, info: "在家外不能動彈。血液含劇毒病毒。", skills: [{n:"病血", s:"引爆冰晶。", d:"不凝固血漿引爆。"}] },
        { name: "閻芊夜", title: "影子害獸", gen: 4, info: "畏光，待在影子裡。兩條尾巴。", skills: [{n:"冰凝之影", s:"影子凍結。", d:"藉影子移動並凍結。"}] },
        { name: "以撒", title: "No.23 / 不存在之人", gen: "X", info: "碎片靈魂召喚。嚴格來說不存在。", skills: [{n:"虛無召喚", s:"歸於不存在。", d:"歸於無。"}] }
    ];

    function openWall() {
        const grid = document.getElementById('memberGrid'); grid.innerHTML = '';
        for(let i=0; i<23; i++) {
            const color = i < 13 ? 'var(--gen1)' : i < 19 ? 'var(--gen2)' : i < 22 ? 'var(--gen3)' : 'var(--gen4)';
            const div = document.createElement('div');
            div.innerHTML = `<div class="member-circle" style="border-color:${color}" onclick="showChar(${i})">${family[i].name}</div><span style="font-size:0.7rem; color:#555; display:block; margin-top:5px; text-align:center;">Gen ${family[i].gen}</span>`;
            grid.appendChild(div);
        }
        if(viewedSet.size >= 23) {
            const isaacDiv = document.createElement('div');
            isaacDiv.className = "isaac-wrapper"; isaacDiv.style.display = "block";
            isaacDiv.innerHTML = `<div class="member-circle isaac-btn" onclick="showChar(23)">以撒</div><span style="font-size:0.7rem; color:#111; display:block; margin-top:5px; text-align:center;">Gen X</span>`;
            grid.appendChild(isaacDiv);
        }
        document.getElementById('wallModal').style.display = 'block';
    }

    function showChar(idx) {
        if(idx < 23) viewedSet.add(idx);
        const c = family[idx];
        
        // --- 眠的特殊視覺效果 ---
        if (c.name === "眠") {
            triggerEyeFlash();
            document.title = "I'm watching you";
            try { history.replaceState(null, "", "Im-watching-you"); } catch(e) {}
        } else {
            resetTitle();
        }

        const content = document.getElementById('charContent');
        let sHtml = c.skills.map(s => `<div class="skill-summary-card" onclick="showSkill('${s.n}', '${s.d}')"><div style="font-weight:bold;">${s.n}</div><div style="font-size:0.8rem; color:#888;">${s.s}</div></div>`).join('');
        
        content.innerHTML = `
            <h2 style="color:var(--accent-color); margin-bottom:5px;">${c.name}</h2>
            <span class="char-title-quote">「${c.title}」</span>
            <div class="char-bio">${c.info}</div>
            <h4 style="margin:0 0 10px;">天賦與權能</h4>
            <div class="skill-list-container">${sHtml}</div>
        `;
        document.getElementById('charModal').style.display = 'block';
    }

    function triggerEyeFlash() {
        const eye = document.getElementById('jumpscare-eye');
        eye.style.display = 'flex';
        setTimeout(() => {
            eye.style.display = 'none';
        }, 100); // 0.1秒閃現
    }

    function resetTitle() {
        document.title = defaultTitle;
        try { history.replaceState(null, "", window.location.pathname); } catch(e) {}
    }

    function backToWall() { resetTitle(); closeModal('charModal'); openWall(); }
    function closeModal(id) { 
        if(id === 'charModal' || id === 'wallModal') resetTitle();
        document.getElementById(id).style.display = 'none'; 
    }

    function showSkill(n, d) {
        document.getElementById('skillContent').innerHTML = `<h3 style="color:var(--accent-color);">${n}</h3><p>${d}</p>`;
        document.getElementById('skillModal').style.display = 'block';
    }

    let fails = 0;
    function askPassword() {
        if(document.getElementById('blood-screen').classList.contains('active')) return;
        const pw = prompt("是否要前往迷霧之外");
        if (pw === "1101116") {
            const nW = window.open('about:blank');
            nW.document.write("<h1>禁忌資料</h1><p>十王內容...</p>");
            nW.document.close();
        } else {
            fails++;
            if(fails >= 5) {
                document.getElementById('blood-screen').classList.add('active');
                document.getElementById('main-content').style.filter = "blur(15px) grayscale(100%)";
                setTimeout(()=> document.getElementById('warning-text').style.display='block', 1000);
            } else { alert("迷霧拒絕了你"); }
        }
    }
</script>
</body>
</html>
